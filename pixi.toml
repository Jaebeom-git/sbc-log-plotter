[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.10,<3.13"
numpy = ">=1.24"
scipy = ">=1.10"
pyyaml = ">=6.0"
matplotlib = ">=3.7"
pyside6 = ">=6.5"
pyqtgraph = ">=0.13"

[pypi-dependencies]
sbc-log-plotter = { path = ".", editable = true }

[tasks]
sbc-log-plot = "sbc-log-plot"
test = "python tests/test_standalone_import.py"
